name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print CI message
        run: echo "CI is running"

      - name: Show current directory
        run: pwd

      - name: List files
        run: ls
