name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 還原套件
        run: dotnet restore

      - name: 編譯
        run: dotnet build --no-restore

      - name: 跑測試
        run: dotnet test --no-build --verbosity normal

      - name: 發布
        run: dotnet publish WinForms_Calculator/WinForms_Calculator.csproj -c Release -o publish
        
      - name: 上傳產出
        uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: publish
      
      - name: 壓縮產出
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path publish/* -DestinationPath calculator.zip
        shell: pwsh
        
      - name: 建立 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: calculator.zip
